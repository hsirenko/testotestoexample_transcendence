worker_processes 1;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  upstream frontend { server frontend:5500; }
  upstream backend  { server backend:3000; }

  # ------------------------------------------------------------------
  # 1) HTTP  →  HTTPS redirect (unchanged)
  # ------------------------------------------------------------------
  server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
  }

  # ------------------------------------------------------------------
  # 2) Main HTTPS server
  # ------------------------------------------------------------------
  server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;   # ✔ same as in Dockerfile
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ---------- SPA -------------------------------------------------
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- JSON REST API --------------------------------------
    location /api/ {
      proxy_pass http://backend/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # ---------- WebSockets -----------------------------------------
    # EDIT #1 – use /ws/ (or keep /socket/, just match frontend JS)
    location /ws/ {
      proxy_pass         http://backend;     # keeps /ws/** suffix intact
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # WebSocket specific timeouts and keepalive
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 60s;
      
      # Disable buffering for real-time communication
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # ---------- Uploaded files -------------------------------------
    # EDIT #2 – add this block so avatars load without 404
    location /uploads/ {
      # Option A (stream via Fastify) – simplest
      proxy_pass http://backend;
    }

    # Option B (serve directly for better throughput)
    #location /uploads/ {
    #  alias /app/uploads/;   # volume mounted in docker-compose
    #  autoindex off;
    #}

    # ---------- Any special auth / OAuth routes (left unchanged) ---
    location ~ ^/(login|signup|password)(/.*)?$ {
      proxy_pass       http://backend;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
    }

    location /auth/ {
      proxy_pass       http://backend/auth/;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
    }
  }
}
