resolver 127.0.0.11 ipv6=off;
upstream backend_up {
    server backend:3000;      # <-- Docker-DNS name + port
}

# HTTP → HTTPS redirection
server {
    listen 80;
    server_name _;        # fill with your domain for LE, or leave "_"
    return 301 https://$host$request_uri;
}

# Main HTTPS virtual-host
server {
    listen 443 ssl;
    #server_name  _;       # again, replace with your real domain

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ─── certificates ───────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ─── static frontend ───────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # ─── REST API ------------------------------------------------
    location /api/ {
        proxy_pass         http://backend_up;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
    }

    # ─── WebSocket endpoints (wss) -------------------------------
    location /ws/ {
        proxy_pass         http://backend_up;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }
}
