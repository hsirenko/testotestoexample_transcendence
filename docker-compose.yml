services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - backend/.env
    expose: ["3000"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile   # two-stage file
    ports:
      - "8080:80"
      - "8443:443"
    depends_on: [backend]
    volumes:                                   # ← single block
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
